<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Monthsary, My Love 🎀</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Hammer JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
</head>
<body>

    <div class="bg-decor decor-1">🌸</div>
    <div class="bg-decor decor-2">💘</div>
    <div class="bg-decor decor-3">✨</div>
    <div class="bg-decor decor-4">🎀</div>

    <div class="header">
        <h1 id="titleText">Happy 31st Monthsary</h1>
    </div>

    <div class="swipe-area" id="swipeArea">
        <div class="swipe-hint" id="hint">Swipe left or right</div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn-circle" title="Previous Card">←</button>
        <button id="resetBtn" class="btn-circle" title="Start Over">↺</button>
        <div class="progress-bar" id="progress">1 / 6</div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
